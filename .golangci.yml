version: "2"

linters:
  exclusions:
    paths:
      - vendor
      - data
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - nilerr
    - nolintlint

  settings:
    errcheck:
      exclude-functions:
        # Standard Go patterns where errors are non-actionable
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*net/http.Response).Body.Close
        # HTTP handler JSON — response already started, error not actionable
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
    nolintlint:
      require-explanation: true
      require-specific: true
    staticcheck:
      checks:
        - "all"
        - "-ST1000" # copyright headers, not package docs
        - "-ST1020" # comment style on exports
        - "-QF1001" # De Morgan readability preference
        - "-QF1012" # WriteString(Sprintf) vs Fprintf — style

run:
  timeout: 5m

formatters:
  enable:
    - gofumpt
