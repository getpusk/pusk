groups:
  - name: demo-alerts
    rules:
      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 50
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "CPU > 50% on {{ $labels.instance }}"

      - alert: HighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 80
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Memory > 80% on {{ $labels.instance }}"

      - alert: DiskSpace
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 80
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk > 80% on {{ $labels.instance }}"

      # Тестовый алерт — сработает через 30 секунд
      - alert: TestAlert
        expr: up == 1
        for: 30s
        labels:
          severity: info
        annotations:
          summary: "Test alert — integration works!"
