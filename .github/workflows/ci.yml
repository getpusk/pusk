name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1.45.1

  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'
      - name: Build with version
        run: |
          VER=$(git describe --tags --always 2>/dev/null || echo "ci")
          go build -ldflags "-X github.com/pusk-platform/pusk/internal/api.Version=$VER" -o pusk ./cmd/pusk/
      - run: go vet ./...
      - run: go test -race -shuffle=on ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest
      - name: gofumpt
        run: test -z "$(gofumpt -l .)"
      - name: JS function integrity
        run: |
          for fn in addMsg sendMsg showList openChat openChan connectWS onCb onDel toggleSub showApp logout auth setLang beep scrollDown; do
            grep -rq "function $fn\|async function $fn" web/static/js/ || { echo "MISSING: $fn"; exit 1; }
          done
      - name: Push notification properties
        run: |
          grep -q 'vibrate' web/static/sw.js || { echo "MISSING: vibrate in push notifications"; exit 1; }
          grep -q 'requireInteraction' web/static/sw.js || { echo "MISSING: requireInteraction in push notifications"; exit 1; }
      - name: No hardcoded secrets in frontend
        run: |
          ! grep -rn 'monitor-bot-token' web/static/ --include='*.html' --include='*.js' || { echo 'Hardcoded token found'; exit 1; }

  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'

      - name: Secret scan — private IPs and internal domains
        run: |
          MATCHES=$(grep -rlE '(192\.168\.[0-9]+\.[0-9]+|10\.0\.[0-9]+\.[0-9]+)' --include='*.go' --include='*.html' --include='*.yml' --include='*.yaml' --include='*.json' . | grep -v .gitleaks.toml | grep -v node_modules | grep -v 'main.go' | grep -v 'ratelimit.go' || true)
          if [ -n "$MATCHES" ]; then
            echo "FAIL: private IP found in: $MATCHES"
            exit 1
          fi
          echo "No private IPs or internal domains found"

      - name: gosec — static security analysis
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -quiet -exclude=G104 ./...

      - name: govulncheck — Go vulnerability database
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go build -o /tmp/pusk-vulncheck ./cmd/pusk/ && govulncheck -mode binary /tmp/pusk-vulncheck

      - name: Trivy — filesystem scan (go.sum + source)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'

      - name: Build Pusk
        run: |
          VER=$(git describe --tags --always 2>/dev/null || echo "ci")
          go build -tags demo -ldflags "-X github.com/pusk-platform/pusk/internal/api.Version=$VER" -o pusk ./cmd/pusk/

      - name: Start Pusk
        run: |
          PUSK_DEMO=1 PUSK_MAX_ORGS=0 PUSK_ADDR=:9999 ./pusk &
          for i in $(seq 1 10); do
            curl -sf http://localhost:9999/api/health && break || sleep 1
          done
          curl -sf http://localhost:9999/api/health | head -1

      - name: Auth — login as guest
        run: |
          TOKEN=$(curl -sf http://localhost:9999/api/auth -X POST \
            -H 'Content-Type: application/json' \
            -d '{"username":"guest","pin":"guest"}' | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Bot API — sendMessage + getMe
        run: |
          curl -sf http://localhost:9999/bot/demo-bot-token/getMe | python3 -c "import sys,json;assert json.load(sys.stdin)['result']['username']=='DemoBot'"
          CHAT=$(curl -sf http://localhost:9999/api/bots/1/start -X POST -H "Authorization: $TOKEN" | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
          curl -sf http://localhost:9999/bot/demo-bot-token/sendMessage -X POST \
            -H 'Content-Type: application/json' \
            -d "{\"chat_id\":$CHAT,\"text\":\"CI test\"}" | python3 -c "import sys,json;assert json.load(sys.stdin)['ok']==True"
          echo "Bot API OK"

      - name: Webhooks — Alertmanager + Zabbix + Grafana
        run: |
          curl -sf http://localhost:9999/hook/demo-bot-token?format=alertmanager -X POST \
            -H 'Content-Type: application/json' \
            -d '{"status":"firing","alerts":[{"status":"firing","labels":{"alertname":"CITest"},"annotations":{"summary":"CI"}}]}'
          curl -sf http://localhost:9999/hook/demo-bot-token?format=zabbix -X POST \
            -H 'Content-Type: application/json' \
            -d '{"subject":"CI Zabbix","message":"test"}'
          curl -sf http://localhost:9999/hook/demo-bot-token?format=grafana -X POST \
            -H 'Content-Type: application/json' \
            -d '{"title":"CI Grafana","state":"ok"}'
          echo "Webhooks OK"

      - name: Multi-tenant — org isolation
        run: |
          ORG=$(curl -sf http://localhost:9999/api/org/register -X POST \
            -H 'Content-Type: application/json' \
            -d '{"slug":"ci-test","name":"CI","username":"admin","pin":"ci-test-password"}')
          ORG_TOKEN=$(echo "$ORG" | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          BOTS=$(curl -sf http://localhost:9999/api/bots -H "Authorization: $ORG_TOKEN" | python3 -c "import sys,json;print(len(json.load(sys.stdin)))")
          [ "$BOTS" = "1" ] && echo "Isolation OK (1 system bot)" || (echo "FAIL: expected 1 bot, got $BOTS" && exit 1)

      - name: Security — unauth blocked
        run: |
          [ "$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:9999/api/bots)" = "401" ] && echo "Unauth blocked OK" || exit 1

      - name: Stop Pusk
        if: always()
        run: pkill pusk || true

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Build Pusk
        run: |
          VER=$(git describe --tags --always 2>/dev/null || echo "ci")
          go build -tags demo -ldflags "-X github.com/pusk-platform/pusk/internal/api.Version=$VER" -o pusk ./cmd/pusk/

      - name: Start Pusk
        run: |
          PUSK_DEMO=1 PUSK_MAX_ORGS=0 PUSK_ADDR=:9999 ./pusk &
          for i in $(seq 1 10); do
            curl -sf http://localhost:9999/api/health && break || sleep 1
          done

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          PUSK_URL: http://localhost:9999
          BASE_URL: http://localhost:9999
        run: npx playwright test pusk.spec.js

      - name: Stop Pusk
        if: always()
        run: pkill pusk || true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage report
        id: cover
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "coverage=$TOTAL" >> $GITHUB_OUTPUT
          echo "## Go Coverage: $TOTAL" >> $GITHUB_STEP_SUMMARY

      - name: Coverage badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        if: github.ref == 'refs/heads/main'
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: pusk-coverage.json
          label: coverage
          message: ${{ steps.cover.outputs.coverage }}
          valColorRange: ${{ steps.cover.outputs.coverage }}
          minColorRange: 30
          maxColorRange: 80
